<!DOCTYPE html>
<html>
{% load static %}
    <head>
        <link rel="stylesheet" href="{% static 'styling/style.css' %}"/>
        <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.css' %}"/>
        <meta charset="UTF-8">
        <title>RENDAPP</title>
        <link rel="shortcut icon" href="{% static 'images/rendapp2.jpg' %}" type="image/x-icon">
    </head>
    <body>
        <!-- Start NAV -->
        <header>
            <div class="logo">
                 <img src="{% static 'images/rendapp 1.jpg' %}" alt="no image"/>
            </div>
            <div class="links">
                <ul>
                    <li>
                        <a href="{% url 'service:home' %}">HOME</a>
                    </li>
                    <li>
                        <a href="{% url 'service:search' %}">FIND SERVICE</a>
                    </li>
                    <li>
                        <a href="{% url 'service:serviceadmin' %}">NOTIFICATIONS</a>
                    </li>
                    <li>
                        <a href="{% url 'service:about' %}">ABOUT </a>
                    </li>
                    <li>
                        <a href="{% url 'service:contact' %}">CONTACT</a>
                    </li>
                </ul>
                 {% if user.is_authenticated %}
                    <div class="user">
                        <a href="{% url 'account_logout' %}">LOGOUT</a>
                    </div>
                {% else %}
                 <div class="user">
                        <a href="{% url 'account_login' %}">LOGIN</a>
                    </div>
                {% endif %}
            </div>
        </header>
        <!-- End NAV -->
<div id="space"></div>
 {% block body %}

{% endblock body %}

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.min.js" integrity="sha384-Atwg2Pkwv9vp0ygtn1JAojH0nYbwNJLPhwyoVbhoPwBhjQPR5VtM2+xf0Uwh9KtT" crossorigin="anonymous"></script>
    <script src="{% static 'bootstrap/js/bootstrap.js' %}"></script>
</body>
</html>
